<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Icon: magnifying glass with AI spark -->
  <circle cx="20" cy="24" r="13" stroke="url(#grad)" stroke-width="3.5"/>
  <line x1="29.5" y1="33.5" x2="38" y2="42" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- AI spark inside the lens -->
  <circle cx="20" cy="24" r="4" fill="url(#grad)" opacity="0.9"/>
  <line x1="20" y1="15" x2="20" y2="17" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="31" x2="20" y2="33" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="24" x2="13" y2="24" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="24" x2="29" y2="24" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="50" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#7C3AED" letter-spacing="-0.5">AI</text>
  <text x="78" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#1F2937" letter-spacing="-0.5">Searches</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
</svg>
