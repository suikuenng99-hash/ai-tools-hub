<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="12" fill="url(#iconGrad)"/>
  <!-- Magnifying glass -->
  <circle cx="21" cy="21" r="10" stroke="white" stroke-width="3"/>
  <line x1="28.5" y1="28.5" x2="36" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- AI spark dot in center -->
  <circle cx="21" cy="21" r="3.5" fill="white" opacity="0.95"/>
  <!-- Small rays -->
  <line x1="21" y1="13" x2="21" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="27" x2="21" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="21" x2="15" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="21" x2="29" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
